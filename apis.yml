      - type: JSONLD
        url: json-ld/chaos-mesh-context.jsonld
    description: >-
      Chaos Mesh provides Kubernetes Custom Resources and a REST API for
      orchestrating chaos experiments including network faults, pod
      failures, IO chaos, stress testing, kernel chaos, DNS chaos, time
      chaos, JVM chaos, and HTTP request injection. The Chaos Dashboard
      exposes a REST API for creating, running, scheduling, and observing
      experiments and multi-step workflows, with RBAC and event auditing.
