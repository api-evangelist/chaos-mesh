description: >-
  Chaos Mesh is a CNCF graduated cloud-native chaos engineering platform
  that orchestrates chaos experiments on Kubernetes to test system
  resilience and reliability. It exposes Kubernetes Custom Resource
  Definitions (CRDs) for a wide range of chaos kinds (network, pod, IO,
  stress, DNS, time, kernel, JVM, HTTP), along with a Chaos Dashboard web
  UI backed by a REST API for creating, managing, and monitoring chaos
  experiments and workflows. Chaos Mesh integrates with Kubernetes, Argo
  Workflows, Prometheus, Grafana, and CI/CD pipelines to run experiments
  safely in staging and production environments.
